

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App - Proje</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Yapılacaklar Listesi</h1>

            <input type="text" id="todoInput" placeholder="Yeni bir görev yazın...">

        <ul id="todoList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
